<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alpine Switch</title>
    <script src="/alpine-switch.js"></script>
    <script src="//unpkg.com/alpinejs" defer></script>
    <link rel="stylesheet" href="//unpkg.com/@picocss/pico">
</head>
<body class="container" x-data="{}">

    <header>
        <h1 x-text="$store.router.title"></h1>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/user/john">John</a></li>
                <li><a href="/user/jane">Jane</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/broken-link">404 Test</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <template x-route="/" x-title="Welcome Home">
            <section>
                <p>The title above updated automatically!</p>
            </section>
        </template>

        <template x-route="/user/:name" x-title="User Profile">
            <section>
                <p>You are viewing: <strong x-text="name"></strong></p>
            </section>
        </template>

        <template x-route="/about" x-title="About Us">
            <section>
                <p>This router now handles everything globally.</p>
            </section>
        </template>

        <template x-route="*" x-title="404 - Not Found">
            <section>
                <p>Sorry, that page doesn't exist.</p>
                <a href="/">Back to Safety</a>
            </section>
        </template>
    </main>

</body>
</html>
